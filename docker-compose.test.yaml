services:
  lint-and-test:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: []
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "pip install -r requirements.txt -r requirements-dev.txt &&
             isort --check-only --diff app/ tests/ &&
             flake8 app/ tests/ &&
             pytest tests/ -v --cov=app"